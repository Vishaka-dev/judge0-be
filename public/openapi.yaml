openapi: 3.0.3
info:
  title: Sample API
  description: Judge0 Backend API Documentation
  version: 1.0.0

servers:
  - url: https://judge0-be.vercel.app
    description: API of Judge0 Backend

paths:
  /challenge/get:
    get:
      tags:
        - Challenge
      summary: Returns a paginated list of challenges
      description: Fetches all coding challenges with pagination support
      parameters:
        - name: page
          in: query
          required: false
          description: Page number to fetch (default is 1)
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          required: false
          description: Number of challenges per page (default is 10)
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: List of challenges
          content:
            application/json:
              schema:
                type: object
                properties:
                  currentPage:
                    type: integer
                    example: 1
                  totalPages:
                    type: integer
                    example: 1
                  challenges:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        created_at:
                          type: string
                          format: date-time
                          example: "2026-02-18 12:40:43.186892+00"
                        title:
                          type: string
                          example: "Merge Intervals"
                        description:
                          type: string
                          example: "Given a collection of intervals, merge all overlapping intervals and return the result."
                        type_id:
                          type: integer
                          example: 1
                        status_id:
                          type: integer
                          example: 1
                        type:
                          type: string
                          example: "DSA"
                        status:
                          type: string
                          example: "INACTIVE"
        "500":
          description: Could not fetch challenges
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "could not fetch challenges"
        default:
          description: Unexpected error

  /challenge/get/{id}:
    get:
      tags:
        - Challenge
      summary: Returns a challenge by ID
      description: Fetches details of a coding challenge by its unique ID
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the challenge
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Challenge found
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenge:
                    oneOf:
                      - $ref: "#/components/schemas/DSAChallenge"
                    discriminator:
                      propertyName: type
                      mapping:
                        DSA: "#/components/schemas/DSAChallenge"
        "404":
          description: Challenge not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Challenge not found"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "internal server error"
        default:
          description: Unexpected error

components:
  schemas:
    DSAChallenge:
      type: object
      required:
        - id
        - title
        - type
      properties:
        id:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
          example: "2026-02-18 12:40:43.186892+00"
        title:
          type: string
          example: "Merge Intervals"
        description:
          type: string
          example: "Given a collection of intervals, merge all overlapping intervals and return the result."
        type_id:
          type: integer
          example: 1
        status_id:
          type: integer
          example: 1
        type:
          type: string
          example: "DSA"
        status:
          type: string
          example: "ACTIVE"
        sample_input:
          type: string
          example: "[[1,2],[2,3]]"
        sample_output:
          type: string
          example: "[[1,3]]"
        note:
          type: string
          example: "This is a classic interval merging problem"
