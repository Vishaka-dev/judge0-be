        - id: 6
          created_at: "2026-02-26 08:28:44.387427+00"
          title: Reverse an Array
          description: "Given an array of integers, reverse the array and print it."
          type_id: 1
          status_id: 1
          type: DSA
          status: INACTIVE
          sample_input: "5\r\n1 2 3 4 5"
          sample_output: 5 4 3 2 1
          note: null
    AddDSAChallengeRequest:
      type: object
      x-stoplight:
        id: 16d334a11e153
      x-examples:
        Example 1:
          title: Merge Intervals
          description: "Given a collection of intervals, merge all overlapping intervals and return the result."
          type_id: 1
          status_id: 1
          sample_input: "[[1,3],[2,6],[8,10],[15,18]]"
          sample_output: "[[1,6],[8,10],[15,18]]"
          note: |-
            * [1,3] overlaps with [2,6]
            * They merge into [1,6]
            * The others do not overlap
          test_cases:
            - test_input: "[[1,3],[2,6],[8,10],[15,18]]"
              test_output: "[[1,6],[8,10],[15,18]]"
            - test_input: "[[1,4],[4,5]]"
              test_output: "[[1,5]]"
      examples:
        - title: string
          description: string
          type_id: 0
          status_id: 0
          sample_input: string
          sample_output: string
          note: string
          test_cases:
            - test_input: string
              test_output: string
      required:
        - title
        - description
        - type_id
        - status_id
        - sample_input
        - sample_output
        - test_cases
      properties:
        title:
          type: string
        description:
          type: string
        type_id:
          type: integer
        status_id:
          type: integer
        sample_input:
          type: string
        sample_output:
          type: string
        note:
          type: string
        test_cases:
          type: array
          items:
            type: object
            required:
              - test_input
              - test_output
            properties:
              test_input:
                type: string
              test_output:
                type: string
    TestChallengeRequest:
      type: object
      x-examples:
        Example 1:
          challenge_id: 1
          language_id: 46
          source_code: echos hello
          stdin: " "
          expected_output: hello
      required:
        - challenge_id
        - language_id
        - source_code
        - stdin
        - expected_output
      properties:
        challenge_id:
          type: integer
        language_id:
          type: integer
        source_code:
          type: string
          description: Should be `base64` encoded
        stdin:
          type: string
          description: Should be `base64` encoded
        expected_output:
          type: string
          description: Should be `base64` encoded
  parameters:
    Auth-Header:
      name: Authorization
      in: header
      required: true
      schema:
        type: string
        example: Bearer <token>
      description: Authorization Header
