          type: integer
        status_id:
          type: integer
        type:
          type: string
        status:
          type: string
      x-examples:
        Example 1:
          id: 1
          created_at: "2026-02-18 12:40:43.186892+00"
          title: Merge Intervals
          description: "Given a collection of intervals, merge all overlapping intervals and return the result."
          type_id: 1
          status_id: 1
          type: DSA
          status: INACTIVE
      examples:
        - id: 1
          created_at: "2026-02-18 12:40:43.186892+00"
          title: Merge Intervals
          description: "Given a collection of intervals, merge all overlapping intervals and return the result."
          type_id: 1
          status_id: 1
          type: DSA
          status: INACTIVE
      title: ""
