openapi: 3.0.0
x-stoplight:
  id: znhuznzkvtirz
info:
  title: Judge0 API
  version: "1.0"
servers:
  - url: "http://localhost:3000/api"
paths:
  /challenge/get:
    get:
      summary: Get Challenges
      tags:
        - challenges
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  currentPage:
                    type: number
                    x-stoplight:
                      id: o11js6i9eg4ph
                    example: 1
                  totalPages:
                    type: string
                    x-stoplight:
                      id: 8sj3umnuyeuxc
                    example: "1"
                  challenges:
                    type: array
                    x-stoplight:
                      id: 3b1h9efo4vqtc
                    items:
                      $ref: "#/components/schemas/Challenge"
                      x-stoplight:
                        id: 45prib8zhecd1
      operationId: get-challenge-get
      x-stoplight:
        id: 3m8v2hzcxmttl
      description: Get all challenges
      parameters:
        - schema:
            type: number
            example: 2
            default: 1
          in: query
          name: page
          description: number of the current page
          allowEmptyValue: true
        - schema:
            type: number
            example: 20
            default: 10
          in: query
          name: pageSize
          description: challenges per page
          allowEmptyValue: true
  "/challenge/get/{id}":
    parameters:
      - schema:
          type: string
        name: id
        in: path
        required: true
        description: ID of the challenge
    get:
      summary: Get Challenge By ID
      tags:
        - challenges
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenge:
                    x-stoplight:
                      id: 65kv5s29d64sj
                    anyOf:
                      - $ref: "#/components/schemas/DSAChallenge"
              examples:
                Example 1:
                  value:
                    challenge:
                      id: 6
                      created_at: "2026-02-26 08:28:44.387427+00"
                      title: Reverse an Array
                      description: "Given an array of integers, reverse the array and print it."
                      type_id: 1
                      status_id: 1
                      type: DSA
                      status: INACTIVE
                      sample_input: "5\r\n1 2 3 4 5"
                      sample_output: 5 4 3 2 1
                      note: null
      operationId: get-challenge-get-id
      x-stoplight:
        id: qxf3822clw6mt
      description: GET Challenge BY ID
  /challenge/add:
    post:
      summary: Add Challenge
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  message:
                    type: string
                x-examples:
                  Example 1:
                    id: 9
                    message: DSA challenge created successfully
              examples:
                Example 1:
                  value:
                    id: 0
                    message: string
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                x-examples:
                  Example 1:
                    error: marks is required
              examples:
                Example 1:
                  value:
                    error: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                x-examples:
                  Example 1:
                    error: authorization header is required
              examples:
                Example 1:
                  value:
                    error: string
      operationId: post-challenge-add
      x-stoplight:
        id: 2jjsyd9wcgg2m
      tags:
        - challenges
      description: Add Challenge
      parameters:
        - $ref: "#/components/parameters/Auth-Header"
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
                - $ref: "#/components/schemas/AddDSAChallengeRequest"
            examples:
              Example 1:
                value:
                  title: string
                  description: string
                  type_id: 0
                  status_id: 0
                  sample_input: string
                  sample_output: string
                  note: string
                  test_cases:
                    - test_input: string
                      test_output: string
  /challenge/test:
    post:
      summary: Test Challenge
      tags:
        - challenges
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      stdout:
                        type: string
                      stderr:
                        type: string
                      token:
                        type: string
                      compile_output:
                        type: string
                      message:
                        type: string
                      status:
                        type: object
                        properties:
                          id:
                            type: integer
                          description:
                            type: string
                x-examples:
                  Example 1:
                    result:
                      stdout: ""
                      stderr: |
                        script.sh: line 1: echos: command not found
                      token: c056a7ae-2ba8-4928-ac16-b725cd78bb13
                      compile_output: ""
                      message: Exited with error status 127
                      status:
                        id: 11
                        description: Runtime Error (NZEC)
              examples:
                Example 1:
                  value:
                    result:
                      stdout: string
                      stderr: string
                      token: string
                      compile_output: string
                      message: string
                      status:
                        id: 0
                        description: string
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                x-examples:
                  Example 1:
                    error: challenge_id is required
              examples:
                Example 1:
                  value:
                    error: challenge_id is required
      operationId: get-challenge-test
      x-stoplight:
        id: p4qwviwv8lail
      parameters:
        - $ref: "#/components/parameters/Auth-Header"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestChallengeRequest"
            examples:
              Example 1:
                value:
                  challenge_id: 0
                  language_id: 0
                  source_code: string
                  stdin: string
                  expected_output: string
components:
