          type: "null"
      x-examples:
        Example 1:
          id: 6
          created_at: "2026-02-26 08:28:44.387427+00"
          title: Reverse an Array
          description: "Given an array of integers, reverse the array and print it."
          type_id: 1
          status_id: 1
          type: DSA
          status: INACTIVE
          sample_input: "5\r\n1 2 3 4 5"
          sample_output: 5 4 3 2 1
